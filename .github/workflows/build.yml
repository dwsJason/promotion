name: Build plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: i256
            project: i256ImageIo.vcxproj
            platform: x64
            output_dir: file_io_plugin_samples/i256/x64/Release
            artifact: i256ImgIo-x64
          - plugin: i256
            project: i256ImageIo.vcxproj
            platform: Win32
            output_dir: file_io_plugin_samples/i256/Release
            artifact: i256ImgIo-Win32
          - plugin: i16
            project: i16ImageIo.vcxproj
            platform: x64
            output_dir: file_io_plugin_samples/i16/x64/Release
            artifact: i16ImgIo-x64
          - plugin: i16
            project: i16ImageIo.vcxproj
            platform: Win32
            output_dir: file_io_plugin_samples/i16/Release
            artifact: i16ImgIo-Win32
          - plugin: c1
            project: c1ImageIo.vcxproj
            platform: x64
            output_dir: file_io_plugin_samples/c1/x64/Release
            artifact: c1ImgIo-x64
          - plugin: c1
            project: c1ImageIo.vcxproj
            platform: Win32
            output_dir: file_io_plugin_samples/c1/Release
            artifact: c1ImgIo-Win32

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build ${{ matrix.plugin }} (Release|${{ matrix.platform }})
        working-directory: file_io_plugin_samples/${{ matrix.plugin }}
        run: msbuild ${{ matrix.project }} /m /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      - name: Show build output
        run: Get-ChildItem -Path "${{ matrix.output_dir }}" -Recurse | Select-Object FullName, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.output_dir }}/*.dll
            ${{ matrix.output_dir }}/*.pdb
          if-no-files-found: error
